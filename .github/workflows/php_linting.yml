name: PHP Syntax Linter

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Versión target de MariaDB / XAMPP utilizada
          tools: cs2pr
          
      - name: Run Syntax Check (php -l)
        run: |
          find . -type f -name "*.php" -print0 | xargs -0 -n1 php -l
